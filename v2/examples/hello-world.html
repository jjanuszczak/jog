<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Standard document metadata. The actual application UI is created by JOG in JavaScript. -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- This title is only the initial browser title. The JOG page can replace it at runtime. -->
    <title>JOG Hello World</title>
    <!-- Load the framework runtime first so the global JOG object exists for the app script. -->
    <script src="../runtime/JOG.js"></script>
    <!-- Load the application code after the runtime. -->
    <script src="../apps/HelloWorldApp.js"></script>
  </head>
  <body>
    <!--
      JOG owns the UI surface after boot.
      You do not hand-author app HTML here.
      The application script creates a JOG.Application, a JOG.Page, and controls,
      then JOG renders the DOM for that control tree into document.body.
    -->
  </body>
</html>
