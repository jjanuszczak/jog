baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'JOG Documentation'
contentDir = 'content/en'
defaultContentLanguage = 'en'
enableGitInfo = true
disableKinds = ['taxonomy']

[languages]
  [languages.en]
    languageName = 'en'
    title = 'JOG Documentation'

[outputs]
  home = ['HTML']
  section = ['HTML']
  page = ['HTML']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = 'tango'

[params]
  description = 'Developer docs for JOG, a JavaScript-first browser UI framework for desktop-style internal tools.'
  github_repo = 'https://github.com/jjanuszczak/jog'
  github_branch = 'main'
  github_subdir = 'jog-docs'
  copyright = 'JOG contributors'

  [params.links]
    [[params.links.user]]
      name = 'Developer Guide'
      url = 'docs/guides/developer-guide/'
      icon = 'fa-solid fa-book'
      desc = 'Start with the runtime model and app-author workflow.'
    [[params.links.user]]
      name = 'API Reference'
      url = 'docs/reference/api-reference/'
      icon = 'fa-solid fa-code'
      desc = 'Browse the implemented JOG V2 public surface.'
    [[params.links.user]]
      name = 'Roadmap'
      url = 'docs/project/roadmap/'
      icon = 'fa-solid fa-list-check'
      desc = 'See what is implemented now and what remains partial.'
    [[params.links.developer]]
      name = 'GitHub'
      url = 'https://github.com/jjanuszczak/jog'
      icon = 'fab fa-github'
      desc = 'Source, issues, and release artifacts.'
    [[params.links.developer]]
      name = 'Contributing'
      url = 'docs/project/contributing/'
      icon = 'fa-solid fa-code-branch'
      desc = 'Contributor rules, checks, and pull request expectations.'
    [[params.links.developer]]
      name = 'Release Guide'
      url = 'docs/project/release-guide/'
      icon = 'fa-solid fa-box-archive'
      desc = 'How JOG release assets are built and published.'

  [params.ui]
    sidebar_menu_foldable = true
    sidebar_search_disable = false
    breadcrumb_disable = false
    navbar_logo = true
    showLightDarkModeMenu = true
    navbar_translucent_over_cover_disable = false

[menu]
  [[menu.main]]
    name = 'Docs'
    url = 'docs/'
    weight = 10
  [[menu.main]]
    name = 'Roadmap'
    url = 'docs/project/roadmap/'
    weight = 20
  [[menu.main]]
    name = 'GitHub'
    url = 'https://github.com/jjanuszczak/jog'
    weight = 30

[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.152.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
