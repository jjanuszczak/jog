name: Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs-pages.yml'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'doc/**'
      - 'jog-docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.152.2
      HUGO_CACHEDIR: ${{ github.workspace }}/jog-docs/.hugo_cache
      GOMODCACHE: ${{ github.workspace }}/jog-docs/.gomodcache
      SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jog-docs/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.5'

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Install docs dependencies
        working-directory: jog-docs
        run: npm ci

      - name: Build docs site
        working-directory: jog-docs
        run: |
          node scripts/sync-docs.mjs
          hugo --baseURL "$SITE_BASE_URL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: jog-docs/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
